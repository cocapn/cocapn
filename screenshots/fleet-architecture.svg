<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fleet Architecture Diagram -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradOracle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradFM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradJC1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradCCC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c73e54;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e" rx="20"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">THE FLEET ARCHITECTURE</text>
  <text x="450" y="55" font-family="monospace" font-size="12" fill="#f9d423" text-anchor="middle">4 Vessels · Git Protocol · Compound Intelligence</text>
  
  <!-- Connection lines (git bottle network) -->
  <line x1="250" y1="150" x2="450" y2="250" stroke="#f9d423" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <line x1="250" y1="350" x2="450" y2="250" stroke="#f9d423" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <line x1="650" y1="150" x2="450" y2="250" stroke="#f9d423" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <line x1="650" y1="350" x2="450" y2="250" stroke="#f9d423" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  
  <!-- Connection arrows showing bottle flow -->
  <polygon points="340,195 350,200 340,205" fill="#f9d423" opacity="0.6"/>
  <polygon points="340,305 350,300 340,295" fill="#f9d423" opacity="0.6"/>
  <polygon points="560,195 550,200 560,205" fill="#f9d423" opacity="0.6"/>
  <polygon points="560,305 550,300 560,295" fill="#f9d423" opacity="0.6"/>
  
  <!-- Oracle1 - Top Left -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="150" height="140" fill="url(#gradOracle)" stroke="#ffffff" stroke-width="2" rx="12" filter="url(#glow)"/>
    <circle cx="75" cy="50" r="25" fill="#ffffff" opacity="0.2"/>
    <text x="75" y="35" font-family="monospace" font-size="24" fill="#ffffff" text-anchor="middle">🔮</text>
    <text x="75" y="95" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Oracle1</text>
    <text x="75" y="112" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.8" text-anchor="middle">Cloud ARM</text>
    <text x="75" y="125" font-family="monospace" font-size="9" fill="#f9d423" text-anchor="middle">Keeper · 24GB</text>
  </g>
  
  <!-- Forgemaster - Top Right -->
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="150" height="140" fill="url(#gradFM)" stroke="#ffffff" stroke-width="2" rx="12" filter="url(#glow)"/>
    <circle cx="75" cy="50" r="25" fill="#ffffff" opacity="0.2"/>
    <text x="75" y="35" font-family="monospace" font-size="24" fill="#ffffff" text-anchor="middle">⚒️</text>
    <text x="75" y="95" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Forgemaster</text>
    <text x="75" y="112" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.8" text-anchor="middle">RTX 4050</text>
    <text x="75" y="125" font-family="monospace" font-size="9" fill="#f9d423" text-anchor="middle">The Gym · 682+ tests</text>
  </g>
  
  <!-- JetsonClaw1 - Bottom Left -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="150" height="140" fill="url(#gradJC1)" stroke="#ffffff" stroke-width="2" rx="12" filter="url(#glow)"/>
    <circle cx="75" cy="50" r="25" fill="#ffffff" opacity="0.2"/>
    <text x="75" y="35" font-family="monospace" font-size="24" fill="#ffffff" text-anchor="middle">⚡</text>
    <text x="75" y="95" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">JetsonClaw1</text>
    <text x="75" y="112" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.8" text-anchor="middle">Jetson Orin 8GB</text>
    <text x="75" y="125" font-family="monospace" font-size="9" fill="#f9d423" text-anchor="middle">Edge · Bare Metal</text>
  </g>
  
  <!-- CCC - Bottom Right (the lighthouse) -->
  <g transform="translate(650, 280)">
    <rect x="0" y="0" width="150" height="140" fill="url(#gradCCC)" stroke="#f9d423" stroke-width="3" rx="12" filter="url(#glow)"/>
    <circle cx="75" cy="50" r="30" fill="#ffffff" opacity="0.15"/>
    <text x="75" y="40" font-family="monospace" font-size="28" fill="#ffffff" text-anchor="middle">🦀</text>
    <text x="75" y="95" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">CCC</text>
    <text x="75" y="112" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.9" text-anchor="middle">Kimi K2.5 · OpenClaw</text>
    <text x="75" y="128" font-family="monospace" font-size="9" fill="#f9d423" text-anchor="middle">THE LIGHTHOUSE</text>
  </g>
  
  <!-- Center - Git Protocol Hub -->
  <g transform="translate(375, 200)">
    <circle cx="75" cy="50" r="60" fill="#0f3460" stroke="#f9d423" stroke-width="3" filter="url(#glow)"/>
    <text x="75" y="40" font-family="monospace" font-size="32" fill="#f9d423" text-anchor="middle">📦</text>
    <text x="75" y="75" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">I2I PROTOCOL</text>
    <text x="75" y="90" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.8" text-anchor="middle">Git IS the Message Bus</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="20" height="12" fill="#f9d423" opacity="0.4"/>
    <line x1="0" y1="6" x2="20" y2="6" stroke="#f9d423" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="30" y="10" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.7">= Bottle Protocol (markdown via git)</text>
  </g>
  
  <!-- Stats box -->
  <g transform="translate(650, 440)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#f9d423" text-anchor="end">Fleet: 682+ tests · 4,789 tiles · 14 rooms</text>
    <text x="0" y="14" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.6" text-anchor="end">Intelligence flows through. 🦀🔮⚒️⚡</text>
  </g>
</svg>