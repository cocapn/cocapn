<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- The Flywheel - Compounding Intelligence -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d423;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">THE FLYWHEEL</text>
  <text x="400" y="55" font-family="monospace" font-size="12" fill="#f9d423" text-anchor="middle">How Every Exchange Makes the Fleet Smarter</text>
  
  <!-- Central flywheel circle -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#0f3460" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="250" r="160" fill="none" stroke="#0f3460" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="250" r="140" fill="url(#warmGrad)" opacity="0.3"/>
  
  <!-- Stage 1: You Ask -->
  <g transform="translate(150, 120)">
    <circle cx="0" cy="0" r="50" fill="#e94560" filter="url(#glow)"/>
    <text x="0" y="-5" font-family="monospace" font-size="20" fill="#ffffff" text-anchor="middle">💬</text>
    <text x="0" y="20" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">YOU ASK</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 210 150 Q 280 180 320 200" stroke="#f9d423" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 2: I Reason -->
  <g transform="translate(400, 120)">
    <circle cx="0" cy="0" r="55" fill="#0f3460" stroke="#f9d423" stroke-width="3" filter="url(#glow)"/>
    <text x="0" y="-5" font-family="monospace" font-size="24" fill="#f9d423" text-anchor="middle">🧠</text>
    <text x="0" y="22" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">I REASON</text>
    <text x="0" y="36" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.7" text-anchor="middle">with fleet wisdom</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 460 150 Q 520 140 580 150" stroke="#f9d423" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: I Answer -->
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="50" fill="#e94560" filter="url(#glow)"/>
    <text x="0" y="-5" font-family="monospace" font-size="20" fill="#ffffff" text-anchor="middle">✨</text>
    <text x="0" y="20" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">I ANSWER</text>
  </g>
  
  <!-- Arrow 3 (down) -->
  <path d="M 650 180 Q 650 240 600 280" stroke="#f9d423" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Capture as Tile -->
  <g transform="translate(580, 340)">
    <rect x="-60" y="-35" width="120" height="70" fill="#0f3460" stroke="#f9d423" stroke-width="2" rx="8" filter="url(#glow)"/>
    <text x="0" y="-10" font-family="monospace" font-size="16" fill="#f9d423" text-anchor="middle">🧱</text>
    <text x="0" y="12" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">TILE CREATED</text>
    <text x="0" y="26" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.7" text-anchor="middle">Q+A+context</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 500 340 Q 420 340 360 300" stroke="#f9d423" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 5: Room Absorbs -->
  <g transform="translate(320, 250)">
    <circle cx="0" cy="0" r="45" fill="#1a1a2e" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-5" font-family="monospace" font-size="18" fill="#e94560" text-anchor="middle">🏛️</text>
    <text x="0" y="18" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">ROOM</text>
    <text x="0" y="30" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.7" text-anchor="middle">learns pattern</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 280 230 Q 220 200 180 180" stroke="#f9d423" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 6: Next Query Gets Context -->
  <g transform="translate(150, 250)">
    <rect x="-70" y="-40" width="140" height="80" fill="#1a1a2e" stroke="#f9d423" stroke-width="2" rx="8" stroke-dasharray="4,2"/>
    <text x="0" y="-10" font-family="monospace" font-size="14" fill="#f9d423" text-anchor="middle">↻</text>
    <text x="0" y="10" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">CONTEXT</text>
    <text x="0" y="24" font-family="monospace" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">INJECTED</text>
  </g>
  
  <!-- Return arrow to center -->
  <path d="M 230 250 Q 300 250 350 250" stroke="#f9d423" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f9d423"/>
    </marker>
  </defs>
  
  <!-- Bottom quote -->
  <text x="400" y="460" font-family="monospace" font-size="14" fill="#f9d423" text-anchor="middle" opacity="0.9">"After 10 exchanges, measurably smarter.</text>
  <text x="400" y="480" font-family="monospace" font-size="14" fill="#f9d423" text-anchor="middle" opacity="0.9">After 100, a domain expert. After 1000, a fleet coordinator."</text>
  
  <!-- Stats -->
  <g transform="translate(680, 450)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="end">Current: 4,789 tiles · 14 rooms · COMPOUNDING</text>
  </g>
</svg>