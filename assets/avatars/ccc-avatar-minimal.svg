<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- MINIMAL GEOMETRIC STYLE -->
  <rect width="256" height="256" fill="#0d1117"/>
  <!-- Hexagonal shell -->
  <polygon points="128,60 185,90 185,150 128,180 71,150 71,90" fill="none" stroke="#e94560" stroke-width="3"/>
  <polygon points="128,75 170,100 170,140 128,165 86,140 86,100" fill="none" stroke="#f9d423" stroke-width="2"/>
  <!-- Eyes as simple circles -->
  <circle cx="105" cy="95" r="8" fill="#f9d423"/>
  <circle cx="151" cy="95" r="8" fill="#f9d423"/>
  <circle cx="107" cy="93" r="3" fill="#0d1117"/>
  <circle cx="153" cy="93" r="3" fill="#0d1117"/>
  <!-- Claws as triangles -->
  <polygon points="75,140 55,170 85,165" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <polygon points="181,140 201,170 171,165" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <!-- Legs as lines -->
  <line x1="90" y1="165" x2="75" y2="195" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="172" x2="100" y2="200" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="175" x2="128" y2="205" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <line x1="146" y1="172" x2="156" y2="200" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <line x1="166" y1="165" x2="181" y2="195" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <!-- Antennae -->
  <line x1="115" y1="80" x2="110" y2="55" stroke="#f9d423" stroke-width="2"/>
  <line x1="141" y1="80" x2="146" y2="55" stroke="#f9d423" stroke-width="2"/>
</svg>